<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Cycle Time App</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: Arial; margin:0; padding:0; background:#111; color:#fff; }
.header { padding:15px; background:#222; text-align:center; font-size:20px; }
.container { padding:15px; }
button { width:100%; padding:15px; margin:5px 0; font-size:18px; border:none; border-radius:8px; }
.start { background:#28a745; color:#fff; }
.stop { background:#dc3545; color:#fff; }
.reset { background:#ffc107; color:#000; }
.card { background:#1e1e1e; padding:10px; margin-top:10px; border-radius:10px; }
</style>
</head>
<body>

<div class="header">Cycle Time Tracker</div>

<div class="container">
    <div id="timer" style="font-size:40px; text-align:center;">00:00</div>

    <button class="start" onclick="startTimer()">Start</button>
    <button class="stop" onclick="stopTimer()">Stop</button>
    <button class="reset" onclick="resetTimer()">Reset</button>

    <div id="history"></div>
</div>

<script>
let startTime = 0;
let timerInterval;
let running = false;
let history = JSON.parse(localStorage.getItem('cycles')) || [];

function updateDisplay(time){
    let sec = Math.floor(time/1000);
    let min = Math.floor(sec/60);
    sec = sec % 60;
    document.getElementById('timer').innerText =
        String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

function startTimer(){
    if(running) return;
    running = true;
    startTime = Date.now();
    timerInterval = setInterval(()=>{
        updateDisplay(Date.now() - startTime);
    }, 500);
}

function stopTimer(){
    if(!running) return;
    running = false;
    clearInterval(timerInterval);
    let duration = Date.now() - startTime;
    history.unshift(duration);
    localStorage.setItem('cycles', JSON.stringify(history));
    renderHistory();
}

function resetTimer(){
    running = false;
    clearInterval(timerInterval);
    updateDisplay(0);
}

function renderHistory(){
    let container = document.getElementById('history');
    container.innerHTML = "";
    history.slice(0,10).forEach((h)=>{
        let sec = Math.floor(h/1000);
        let min = Math.floor(sec/60);
        sec = sec % 60;
        let div = document.createElement('div');
        div.className = "card";
        div.innerText = "Cycle: " + min + "m " + sec + "s";
        container.appendChild(div);
    });
}

renderHistory();

// register service worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
